# CI/CD - Health Monitoring Platform
# Builds services, runs checks, and (on main) pushes Docker images to GitHub Container Registry.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            frontend-web/package-lock.json
            services/api-gateway/package-lock.json

      - name: Install frontend-web deps
        run: |
          cd frontend-web && npm ci 2>/dev/null || npm install
      - name: Build frontend-web
        run: cd frontend-web && npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API Gateway deps
        run: |
          cd services/api-gateway && npm ci 2>/dev/null || npm install
      - name: Install Python services deps
        run: |
          pip install fastapi uvicorn pydantic
          cd services/user-service && pip install -r requirements.txt
          cd ../health-data-service && pip install -r requirements.txt
          cd ../ai-inference-service && pip install -r requirements.txt
          cd ../notification-service && pip install -r requirements.txt
      - name: Syntax check Python services
        run: |
          python -m py_compile services/user-service/main.py
          python -m py_compile services/health-data-service/main.py
          python -m py_compile services/ai-inference-service/main.py
          python -m py_compile services/ai-inference-service/model_loader.py
          python -m py_compile services/notification-service/main.py

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        service: [api-gateway, user-service, health-data-service, ai-inference-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main) ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            health-platform/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/health-platform-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/health-platform-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
